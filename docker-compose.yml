services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://linkist:${DB_PASSWORD}@db:5432/linkist
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkist
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: linkist
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkist"]
      interval: 5s
      timeout: 5s
      retries: 5

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache aws-cli
        echo "Backup service started. Running daily at 2:00 AM UTC."
        while true; do
          NEXT_RUN=$$(date -d "tomorrow 02:00" +%s 2>/dev/null || date -v+1d -v2H -v0M -v0S +%s)
          NOW=$$(date +%s)
          SLEEP_SEC=$$((NEXT_RUN - NOW))
          if [ $$SLEEP_SEC -le 0 ]; then SLEEP_SEC=86400; fi
          echo "Next backup in $$SLEEP_SEC seconds..."
          sleep $$SLEEP_SEC
          DATE=$$(date +%Y-%m-%d_%H-%M-%S)
          DUMP_FILE="/tmp/linkist-backup-$${DATE}.sql.gz"
          echo "Starting backup $${DATE}..."
          PGPASSWORD="$$DB_PASSWORD" pg_dump -h db -U linkist linkist | gzip > "$$DUMP_FILE"
          aws s3 cp "$$DUMP_FILE" "s3://$${AWS_S3_BUCKET}/backups/$${DATE}.sql.gz" --quiet
          rm -f "$$DUMP_FILE"
          echo "Backup uploaded: s3://$${AWS_S3_BUCKET}/backups/$${DATE}.sql.gz"
          # Clean backups older than 30 days
          CUTOFF=$$(date -d "30 days ago" +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          aws s3 ls "s3://$${AWS_S3_BUCKET}/backups/" | while read -r line; do
            FNAME=$$(echo "$$line" | awk '{print $$4}')
            FDATE=$$(echo "$$FNAME" | cut -d'_' -f1)
            if [ -n "$$FDATE" ] && [ "$$FDATE" \< "$$CUTOFF" ]; then
              aws s3 rm "s3://$${AWS_S3_BUCKET}/backups/$$FNAME" --quiet
              echo "Deleted old backup: $$FNAME"
            fi
          done
        done
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
