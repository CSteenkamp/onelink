apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: linkist
spec:
  schedule: "0 2 * * *" # Daily at 2:00 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache aws-cli
                  DATE=$(date +%Y-%m-%d_%H-%M-%S)
                  DUMP_FILE="/tmp/linkist-backup-${DATE}.sql.gz"
                  echo "Starting backup ${DATE}..."
                  PGPASSWORD="${DB_PASSWORD}" pg_dump -h postgres -U linkist linkist | gzip > "${DUMP_FILE}"
                  aws s3 cp "${DUMP_FILE}" "s3://${AWS_S3_BUCKET}/backups/${DATE}.sql.gz"
                  rm -f "${DUMP_FILE}"
                  echo "Backup uploaded: s3://${AWS_S3_BUCKET}/backups/${DATE}.sql.gz"
                  # Clean backups older than 30 days
                  CUTOFF=$(date -d "30 days ago" +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
                  aws s3 ls "s3://${AWS_S3_BUCKET}/backups/" | while read -r line; do
                    FNAME=$(echo "$line" | awk '{print $4}')
                    FDATE=$(echo "$FNAME" | cut -d'_' -f1)
                    if [ -n "$FDATE" ] && [ "$FDATE" \< "$CUTOFF" ]; then
                      aws s3 rm "s3://${AWS_S3_BUCKET}/backups/$FNAME"
                      echo "Deleted old backup: $FNAME"
                    fi
                  done
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: linkist-secrets
                      key: DB_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: linkist-secrets
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: linkist-secrets
                      key: AWS_SECRET_ACCESS_KEY
              envFrom:
                - configMapRef:
                    name: linkist-config
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
